<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Versiory Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        :root {
            --versiory-ink: #0f172a;
            --versiory-coral: #ff6b4a;
            --versiory-teal: #1b9aaa;
            --versiory-gold: #f3b45c;
        }
        .bg-versiory-ink { background-color: var(--versiory-ink); }
        .text-versiory-coral { color: var(--versiory-coral); }
        .bg-versiory-coral { background-color: var(--versiory-coral); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app">
        <!-- Login Screen -->
        <div id="loginScreen" class="min-h-screen bg-versiory-ink flex items-center justify-center px-4">
            <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-versiory-coral rounded-2xl mx-auto mb-4 flex items-center justify-center">
                        <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M36 20 H64 L50 43 L36 20 Z" fill="white" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">Painel Admin</h1>
                    <p class="text-gray-600">Versiory Store</p>
                </div>

                <form onsubmit="handleLogin(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">
                            Senha de Acesso
                        </label>
                        <input
                            type="password"
                            id="adminPassword"
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none transition-all"
                            placeholder="Digite sua senha"
                            required
                        />
                    </div>

                    <div id="errorMessage" class="bg-red-50 border-2 border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm font-medium hidden">
                        Senha incorreta. Tente novamente.
                    </div>

                    <button
                        type="submit"
                        class="w-full bg-versiory-coral hover:bg-red-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:-translate-y-1 active:scale-95"
                    >
                        Acessar Painel
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-xs text-gray-500">
                        Área restrita • Versiory Store © 2024
                    </p>
                    <p class="text-xs text-gray-400 mt-2">
                        Senha: <span class="font-mono bg-gray-100 px-2 py-1 rounded">versiory2024</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboardScreen" class="hidden min-h-screen bg-gray-50">
            <!-- Header -->
            <div class="bg-versiory-ink text-white shadow-lg">
                <div class="max-w-7xl mx-auto px-4 py-6">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-versiory-coral rounded-xl flex items-center justify-center">
                                <svg width="24" height="24" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M36 20 H64 L50 43 L36 20 Z" fill="white" />
                                </svg>
                            </div>
                            <div>
                                <h1 class="text-2xl font-bold">Painel Administrativo</h1>
                                <p class="text-gray-400 text-sm">Versiory Store</p>
                            </div>
                        </div>
                        <button
                            onclick="handleLogout()"
                            class="bg-red-500 hover:bg-red-600 px-6 py-2 rounded-xl font-medium transition-all"
                        >
                            Sair
                        </button>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="max-w-7xl mx-auto px-4 py-8">
                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div id="totalProducts" class="text-3xl font-bold text-versiory-coral">0</div>
                        <div class="text-gray-600 font-medium">Total Produtos</div>
                    </div>
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div id="eletronicsCount" class="text-3xl font-bold text-versiory-teal">0</div>
                        <div class="text-gray-600 font-medium">Eletrônicos</div>
                    </div>
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div id="modaCount" class="text-3xl font-bold text-versiory-gold">0</div>
                        <div class="text-gray-600 font-medium">Moda</div>
                    </div>
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div id="totalReviews" class="text-3xl font-bold text-purple-500">0</div>
                        <div class="text-gray-600 font-medium">Total Avaliações</div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-900">Gerenciar Produtos</h2>
                    <button
                        onclick="openAddModal()"
                        class="bg-versiory-coral hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg hover:-translate-y-1 active:scale-95"
                    >
                        + Novo Produto
                    </button>
                </div>

                <!-- Products Table -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">ID</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Produto</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Categoria</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Preço</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Avaliação</th>
                                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody" class="divide-y divide-gray-200">
                                <!-- Products will be inserted here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Modal -->
        <div id="productModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <div class="p-6 border-b border-gray-200">
                    <h3 id="modalTitle" class="text-xl font-bold text-gray-900">Novo Produto</h3>
                </div>

                <form onsubmit="handleProductSubmit(event)" class="p-6 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Nome do Produto</label>
                            <input type="text" id="productName" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Preço (R$)</label>
                            <input type="number" step="0.01" id="productPrice" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Categoria</label>
                            <select id="productCategory" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none">
                                <option value="Eletrônicos">Eletrônicos</option>
                                <option value="Moda">Moda</option>
                                <option value="Casa">Casa</option>
                                <option value="Esportes">Esportes</option>
                                <option value="__new__">Nova categoria...</option>
                            </select>
                        </div>
                        <div id="customCategoryWrapper" class="hidden">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Nova Categoria</label>
                            <input type="text" id="customCategory" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none" placeholder="Ex.: Beleza" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Imagem do Produto</label>
                            <input type="file" id="productImage" accept="image/*" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none" />
                            <img id="productImagePreview" class="hidden mt-3 h-24 w-24 rounded-xl object-cover border border-gray-200" alt="Preview" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Avaliação (0-5)</label>
                            <input type="number" step="0.1" min="0" max="5" id="productRating" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Nº de Avaliações</label>
                            <input type="number" min="0" id="productReviews" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none" />
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Descrição</label>
                        <textarea id="productDescription" rows="4" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-versiory-coral focus:border-transparent outline-none"></textarea>
                    </div>

                    <div class="flex gap-4 pt-4">
                        <button type="submit" class="flex-1 bg-versiory-coral hover:bg-red-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg hover:-translate-y-1 active:scale-95">
                            Salvar Produto
                        </button>
                        <button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 rounded-xl transition-all">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'versiory2024';
        const BASE_CATEGORIES = ['Eletrônicos', 'Moda', 'Casa', 'Esportes'];
        let products = [];
        let editingProductId = null;
        let currentImageData = '';

        // Load products from localStorage or use defaults
        function loadProducts() {
            const saved = localStorage.getItem('versiory_products');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                // Default products
                products = [
                    {
                        id: 1,
                        name: "Headphone Wireless Pro",
                        price: 899.90,
                        category: "Eletrônicos",
                        image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&q=80",
                        description: "Cancelamento de ruído ativo e som de alta fidelidade.",
                        rating: 4.8,
                        reviews: 124
                    },
                    {
                        id: 2,
                        name: "Relógio Inteligente S3",
                        price: 1249.00,
                        category: "Eletrônicos",
                        image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&q=80",
                        description: "Monitore sua saúde e receba notificações.",
                        rating: 4.6,
                        reviews: 89
                    }
                ];
                localStorage.setItem('versiory_products', JSON.stringify(products));
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('adminPassword').value;
            const errorMsg = document.getElementById('errorMessage');
            
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                errorMsg.classList.add('hidden');
                loadDashboard();
            } else {
                errorMsg.classList.remove('hidden');
            }
        }

        function handleLogout() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
        }

        function loadDashboard() {
            syncCategoryOptions();
            updateStats();
            renderProductsTable();
        }

        function updateStats() {
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('eletronicsCount').textContent = products.filter(p => p.category === 'Eletrônicos').length;
            document.getElementById('modaCount').textContent = products.filter(p => p.category === 'Moda').length;
            document.getElementById('totalReviews').textContent = products.reduce((sum, p) => sum + p.reviews, 0);
        }

        function renderProductsTable() {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = products.map(product => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">#${product.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <img src="${product.image}" alt="${product.name}" class="w-10 h-10 rounded-lg object-cover mr-3">
                            <div>
                                <div class="text-sm font-medium text-gray-900">${product.name}</div>
                                <div class="text-xs text-gray-500 line-clamp-1">${product.description}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">
                            ${product.category}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                        R$ ${product.price.toFixed(2)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <span class="text-sm font-medium text-gray-900">${product.rating}</span>
                            <span class="text-yellow-400 ml-1">★</span>
                            <span class="text-xs text-gray-500 ml-1">(${product.reviews})</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="editProduct(${product.id})" class="bg-versiory-coral hover:bg-red-600 text-white px-4 py-2 rounded-xl font-medium transition-all min-h-[44px] mr-2">
                            Editar
                        </button>
                        <button onclick="deleteProduct(${product.id})" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl font-medium transition-all min-h-[44px]">
                            Excluir
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function openAddModal() {
            editingProductId = null;
            document.getElementById('modalTitle').textContent = 'Novo Produto';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productCategory').value = 'Eletrônicos';
            document.getElementById('productImage').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('productRating').value = '';
            document.getElementById('productReviews').value = '';
            document.getElementById('customCategory').value = '';
            setCustomCategoryVisibility(false);
            setImagePreview('');
            currentImageData = '';
            document.getElementById('productModal').classList.remove('hidden');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                editingProductId = id;
                document.getElementById('modalTitle').textContent = 'Editar Produto';
                document.getElementById('productName').value = product.name;
                document.getElementById('productPrice').value = product.price;
                ensureCategoryOption(product.category);
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productImage').value = '';
                document.getElementById('productDescription').value = product.description;
                document.getElementById('productRating').value = product.rating;
                document.getElementById('productReviews').value = product.reviews;
                document.getElementById('customCategory').value = '';
                setCustomCategoryVisibility(false);
                currentImageData = product.image || '';
                setImagePreview(currentImageData);
                document.getElementById('productModal').classList.remove('hidden');
            }
        }

        function deleteProduct(id) {
            if (confirm('Tem certeza que deseja excluir este produto?')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('versiory_products', JSON.stringify(products));
                updateStats();
                renderProductsTable();
            }
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
        }

        function handleProductSubmit(event) {
            event.preventDefault();

            const categorySelect = document.getElementById('productCategory');
            const customCategoryInput = document.getElementById('customCategory');
            const selectedCategory = categorySelect.value === '__new__'
                ? customCategoryInput.value.trim()
                : categorySelect.value;

            if (!selectedCategory) {
                alert('Informe a categoria do produto.');
                return;
            }

            if (!currentImageData) {
                alert('Envie uma imagem do produto.');
                return;
            }
            
            const productData = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                category: selectedCategory,
                image: currentImageData,
                description: document.getElementById('productDescription').value,
                rating: parseFloat(document.getElementById('productRating').value),
                reviews: parseInt(document.getElementById('productReviews').value)
            };

            if (editingProductId) {
                // Update existing product
                const index = products.findIndex(p => p.id === editingProductId);
                if (index !== -1) {
                    products[index] = { ...products[index], ...productData };
                }
            } else {
                // Add new product
                const newProduct = {
                    id: Math.max(...products.map(p => p.id), 0) + 1,
                    ...productData
                };
                products.push(newProduct);
            }

            localStorage.setItem('versiory_products', JSON.stringify(products));
            ensureCategoryOption(productData.category);
            updateStats();
            renderProductsTable();
            closeModal();
        }

        function ensureCategoryOption(category) {
            if (!category) return;

            const select = document.getElementById('productCategory');
            const exists = Array.from(select.options).some(option => option.value === category);
            if (exists) return;

            const newOption = document.createElement('option');
            newOption.value = category;
            newOption.textContent = category;
            const customOption = select.querySelector('option[value="__new__"]');
            select.insertBefore(newOption, customOption);
        }

        function syncCategoryOptions() {
            BASE_CATEGORIES.forEach(category => ensureCategoryOption(category));
            products.forEach(product => ensureCategoryOption(product.category));
        }

        function setCustomCategoryVisibility(visible) {
            const wrapper = document.getElementById('customCategoryWrapper');
            const input = document.getElementById('customCategory');
            if (visible) {
                wrapper.classList.remove('hidden');
                input.setAttribute('required', 'required');
            } else {
                wrapper.classList.add('hidden');
                input.removeAttribute('required');
                input.value = '';
            }
        }

        function setImagePreview(dataUrl) {
            const preview = document.getElementById('productImagePreview');
            if (dataUrl) {
                preview.src = dataUrl;
                preview.classList.remove('hidden');
            } else {
                preview.removeAttribute('src');
                preview.classList.add('hidden');
            }
        }

        document.getElementById('productCategory').addEventListener('change', (event) => {
            setCustomCategoryVisibility(event.target.value === '__new__');
        });

        document.getElementById('productImage').addEventListener('change', (event) => {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                currentImageData = typeof reader.result === 'string' ? reader.result : '';
                setImagePreview(currentImageData);
            };
            reader.readAsDataURL(file);
        });

        // Initialize
        loadProducts();
        syncCategoryOptions();
    </script>
</body>
</html>
